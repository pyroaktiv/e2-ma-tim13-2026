services:
  backend:
    build: .
    ports:
      - "3000:3000"
    environment:
      PORT: "3000"
      DB_PATH: /data/slagalica.db
      JWT_SECRET: ${JWT_SECRET}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      BASE_URL: ${BASE_URL:-http://localhost:3000}
    volumes:
      - ./db:/data
    restart: unless-stopped
